<!doctype html>
<html lang="{{ .Lang }}" itemscope itemtype="http://schema.org/WebPage">
  <head>
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-M7N7CJ5L");
    </script>
    <!-- End Google Tag Manager -->
    {{- partial "head.html" . -}}
    {{ range .Params.build_js }}
      {{- $js := resources.Get (printf "js/%s.js" .) | js.Build (dict "sourcemap" "inline" "minify" true "target" "es2015") -}}
      <script src="{{ $js.RelPermalink }}" defer></script>
    {{ end }}

  </head>
  <body
    class="dark:bg-gray-800 dark:text-white relative flex flex-col min-h-screen"
  >
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-M7N7CJ5L"
        height="0"
        width="0"
        style="display:none;visibility:hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {{- partial "header.html" . -}}
    <main class="flex-1">
      {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . -}}
  </body>
  <script>
    window.addEventListener("load", () => {
      if (!window.location.hash) return;
      const targetElement = document.getElementById(
        window.location.hash.slice(1),
      );
      if (!targetElement) return;
      targetElement.scrollIntoView({ behavior: "smooth" });
    });
  </script>
</html>
